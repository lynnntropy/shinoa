name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log into Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        if: ${{ github.ref != 'refs/heads/main' }}
        with:
          push: true
          tags: omegavesko/shinoa:${{ github.sha }}

      - name: Build and push Docker image (tags latest)
        uses: docker/build-push-action@v2
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          push: true
          tags: omegavesko/shinoa:${{ github.sha }},omegavesko/shinoa:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    permissions:
      id-token: write # This is required for the Tailscale action to request a JWT from GitHub
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to Kubernetes
        uses: azure/k8s-deploy@v5
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          namespace: "shinoa"
          manifests: |
            .infra/kubernetes/deployment.yaml
          images: omegavesko/shinoa:${{ github.sha }}
