services:
  shinoa:
    image: denoland/deno:2.5.1
    command: deno task dev
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DENO_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db/shinoa
      TOKEN: ~
      LOG_LEVEL: ~
      SAUCENAO_API_KEY: ~
      WEEB_SH_API_KEY: ~
      AMARI_BOT_API_TOKEN: ~
    depends_on:
      - db

  db:
    image: postgres:17
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shinoa
